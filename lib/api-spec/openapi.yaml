openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI Study Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: subjects
    description: Study subject categories
  - name: decks
    description: Flashcard decks
  - name: cards
    description: Flashcards
  - name: studySessions
    description: Study session tracking
  - name: dashboard
    description: Dashboard statistics
  - name: openai
    description: OpenAI AI chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /subjects:
    get:
      operationId: listSubjects
      tags: [subjects]
      summary: List all subjects
      responses:
        "200":
          description: List of subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"
    post:
      operationId: createSubject
      tags: [subjects]
      summary: Create a subject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubjectInput"
      responses:
        "201":
          description: Created subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"

  /subjects/{id}:
    delete:
      operationId: deleteSubject
      tags: [subjects]
      summary: Delete a subject
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /decks:
    get:
      operationId: listDecks
      tags: [decks]
      summary: List all decks
      parameters:
        - name: subjectId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of decks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deck"
    post:
      operationId: createDeck
      tags: [decks]
      summary: Create a deck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeckInput"
      responses:
        "201":
          description: Created deck
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deck"

  /decks/{id}:
    get:
      operationId: getDeck
      tags: [decks]
      summary: Get a deck with its cards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deck with cards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeckWithCards"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateDeck
      tags: [decks]
      summary: Update a deck
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeckUpdate"
      responses:
        "200":
          description: Updated deck
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deck"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDeck
      tags: [decks]
      summary: Delete a deck
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /decks/{deckId}/cards:
    get:
      operationId: listCards
      tags: [cards]
      summary: List cards in a deck
      parameters:
        - name: deckId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of flashcards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Card"
    post:
      operationId: createCard
      tags: [cards]
      summary: Create a card in a deck
      parameters:
        - name: deckId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CardInput"
      responses:
        "201":
          description: Created card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"

  /cards/{id}:
    patch:
      operationId: updateCard
      tags: [cards]
      summary: Update a card (including marking mastered)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CardUpdate"
      responses:
        "200":
          description: Updated card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCard
      tags: [cards]
      summary: Delete a card
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /study-sessions:
    get:
      operationId: listStudySessions
      tags: [studySessions]
      summary: List recent study sessions
      responses:
        "200":
          description: List of study sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudySession"
    post:
      operationId: createStudySession
      tags: [studySessions]
      summary: Record a completed study session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudySessionInput"
      responses:
        "201":
          description: Created study session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudySession"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all AI tutor conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new AI tutor conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a message and receive a streaming AI response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Subject:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
        icon:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - color
        - icon
        - createdAt

    SubjectInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string
        icon:
          type: string
      required:
        - name
        - color
        - icon

    Deck:
      type: object
      properties:
        id:
          type: integer
        subjectId:
          type: ["integer", "null"]
        name:
          type: string
        description:
          type: ["string", "null"]
        cardCount:
          type: integer
        masteredCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - subjectId
        - name
        - description
        - cardCount
        - masteredCount
        - createdAt
        - updatedAt

    DeckInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        subjectId:
          type: integer
      required:
        - name

    DeckUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        subjectId:
          type: ["integer", "null"]

    Card:
      type: object
      properties:
        id:
          type: integer
        deckId:
          type: integer
        front:
          type: string
        back:
          type: string
        mastered:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - deckId
        - front
        - back
        - mastered
        - createdAt

    CardInput:
      type: object
      properties:
        front:
          type: string
          minLength: 1
        back:
          type: string
          minLength: 1
      required:
        - front
        - back

    CardUpdate:
      type: object
      properties:
        front:
          type: string
        back:
          type: string
        mastered:
          type: boolean

    DeckWithCards:
      type: object
      properties:
        id:
          type: integer
        subjectId:
          type: ["integer", "null"]
        name:
          type: string
        description:
          type: ["string", "null"]
        cardCount:
          type: integer
        masteredCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        cards:
          type: array
          items:
            $ref: "#/components/schemas/Card"
      required:
        - id
        - subjectId
        - name
        - description
        - cardCount
        - masteredCount
        - createdAt
        - updatedAt
        - cards

    StudySession:
      type: object
      properties:
        id:
          type: integer
        deckId:
          type: integer
        deckName:
          type: string
        cardsReviewed:
          type: integer
        correctCount:
          type: integer
        durationSeconds:
          type: integer
        completedAt:
          type: string
          format: date-time
      required:
        - id
        - deckId
        - deckName
        - cardsReviewed
        - correctCount
        - durationSeconds
        - completedAt

    StudySessionInput:
      type: object
      properties:
        deckId:
          type: integer
        cardsReviewed:
          type: integer
        correctCount:
          type: integer
        durationSeconds:
          type: integer
      required:
        - deckId
        - cardsReviewed
        - correctCount
        - durationSeconds

    DashboardStats:
      type: object
      properties:
        totalDecks:
          type: integer
        totalCards:
          type: integer
        masteredCards:
          type: integer
        totalSessions:
          type: integer
        totalStudyMinutes:
          type: integer
        recentSessions:
          type: array
          items:
            $ref: "#/components/schemas/StudySession"
        subjectBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/SubjectStat"
      required:
        - totalDecks
        - totalCards
        - masteredCards
        - totalSessions
        - totalStudyMinutes
        - recentSessions
        - subjectBreakdown

    SubjectStat:
      type: object
      properties:
        subjectId:
          type: ["integer", "null"]
        subjectName:
          type: string
        deckCount:
          type: integer
        cardCount:
          type: integer
        masteredCount:
          type: integer
      required:
        - subjectId
        - subjectName
        - deckCount
        - cardCount
        - masteredCount

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    OpenaiConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    OpenaiMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
